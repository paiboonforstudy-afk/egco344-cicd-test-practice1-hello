name: Production Grade CI/CD
on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: สำหรับทดสอบโค้ดโดยเฉพาะ
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    - run: npm ci
    - run: npm test

  # JOB 2: สำหรับ Build และ Push Image (จะรันก็ต่อเมื่อ Job test ผ่านเท่านั้น)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-hello-world:latest